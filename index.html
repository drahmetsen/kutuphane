<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kütüphane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-head">
    <div class="head-inner">
      <div class="brand">
        <p class="eyebrow">kişisel arşiv</p>
        <h1 class="brand-title">Kütüphane <span>&amp;</span> Eserler</h1>
      </div>
      <div class="auth-box">
        <span id="who" class="who" hidden></span>
        <button id="loginBtn" class="btn btn-ghost">Giriş yap</button>
        <button id="logoutBtn" class="btn btn-ghost" hidden>Çıkış</button>
      </div>
    </div>

    <nav class="tabs" role="tablist">
      <button class="tab is-active" data-tab="library" role="tab">Kütüphane</button>
      <button class="tab" data-tab="works" role="tab">Eserleri</button>
    </nav>
  </header>

  <main class="wrap">
    <!-- toolbar -->
    <section class="toolbar">
      <input id="search" class="search" type="search" placeholder="Başlık veya yazar ara…" autocomplete="off" />
      <div id="filters" class="filters"><!-- filled per tab --></div>
      <div class="toolbar-end">
        <span id="count" class="count"></span>
        <button id="addBtn" class="btn btn-solid" hidden>+ Ekle</button>
      </div>
    </section>

    <!-- table -->
    <section class="table-card">
      <table class="ledger">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty" hidden>Kayıt bulunamadı.</div>
    </section>

    <!-- pagination -->
    <section class="pager">
      <button id="prev" class="btn btn-ghost" disabled>← Önceki</button>
      <span id="pageInfo" class="page-info"></span>
      <button id="next" class="btn btn-ghost" disabled>Sonraki →</button>
    </section>
  </main>

  <!-- ===== Add / Edit modal ===== -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <h2 id="modalTitle" class="modal-title">Yeni kayıt</h2>
      <form id="form" class="form"><!-- fields injected per tab --></form>
      <div class="modal-actions">
        <button id="archiveBtn" type="button" class="btn btn-danger" hidden>Arşivle</button>
        <span class="spacer"></span>
        <button id="cancelBtn" type="button" class="btn btn-ghost">Vazgeç</button>
        <button id="saveBtn" type="button" class="btn btn-solid">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- ===== Login modal ===== -->
  <div id="loginModal" class="modal" hidden>
    <div class="modal-card modal-narrow">
      <h2 class="modal-title">Giriş</h2>
      <form id="loginForm" class="form">
        <label class="field">
          <span>E-posta</span>
          <input id="email" type="email" required />
        </label>
        <label class="field">
          <span>Şifre</span>
          <input id="password" type="password" required />
        </label>
        <p id="loginError" class="form-error" hidden></p>
      </form>
      <div class="modal-actions">
        <span class="spacer"></span>
        <button id="loginCancel" type="button" class="btn btn-ghost">Vazgeç</button>
        <button id="loginSubmit" type="button" class="btn btn-solid">Giriş yap</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
